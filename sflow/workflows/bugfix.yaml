# Canonical phase machine for the bugfix workflow (root-cause-first, reproduction-
# test-driven). Same schema as feature.yaml; see the header comment there.
# The analysis phase has no /sf-* command — the driver agent runs it directly.
name: bugfix
description: Structured bugfix — failing reproduction test first, then the smallest fix
escalate: >
  If root-cause analysis reveals the fix needs new features, architectural change,
  multiple units, or shared-unit impact, stop and recommend the feature workflow.
phases:
  - id: analysis           # driver-led; no /sf-* command
    roles: [test-contract, acceptance-criteria]
    inputs: [.meta.yaml]
    outputs: [analysis.md]   # root cause + the bug's AC; the failing test lands in the target repo
    gate: human
    required: true
    exit: named, deterministic, FAILING reproduction test asserts the correct behavior (the bug's AC)

  - id: tasks
    command: /sf-tasks
    roles: [task-design, test-contract]
    inputs: [analysis.md]
    outputs: [tasks.md]
    gate: auto
    required: true
    exit: minimal fix tasks; the reproduction AC has a test task

  - id: implement
    command: /sf-implement
    roles: [implementation, test-contract, "tracker-sync?"]
    inputs: [tasks.md, analysis.md]
    gate: human
    required: true
    exit: smallest change turns the reproduction test green; human verifies the code before validate/qa

  - id: validate
    command: /sf-validate
    roles: [test-contract, architecture-design]
    inputs: [analysis.md, tasks.md]
    gate: auto
    required: true
    exit: reproduction test present + AC-traced; all checks PASS

  - id: qa
    command: /sf-qa
    roles: [qa-report, test-forensics, test-contract]
    inputs: [analysis.md, tasks.md]
    outputs: [qa-report.md]
    gate: human
    required: false        # run when non-trivial or the fix touches shared units; else skip with reason
    exit: enters only after validate PASS; build + suite green; findings dispositioned by the reviewer (sign-off)

  - id: drift
    command: /sf-drift
    roles: [test-forensics, "tracker-align?"]
    inputs: [analysis.md, tasks.md]
    gate: auto
    required: false       # run when the fix touched shared units; else skip with reason
    exit: no unspecced behavior introduced by the fix
